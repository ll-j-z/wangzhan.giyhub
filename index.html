<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数码先锋 - 首页</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 首页特有样式 */
        .banner {
            width: 100%;
            height: 300px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background-image: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .section-title {
            border-left: 5px solid #007bff;
            padding-left: 10px;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .product-card {
            border: 1px solid #eee;
            padding: 10px;
            text-align: center;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-img {
            width: 100%;
            height: 150px;
            background-color: #f9f9f9;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="logo">数码先锋</div>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="list.html">产品列表</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="user.html">用户中心</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
<div class="banner" style="height: 350px; overflow: hidden; display: flex; justify-content: center;">
    <img src="img/8.jpg" alt="双十一大促海报" style="width: 100%; height: 100%; object-fit: cover;">
</div>

        <!-- 热门推荐 -->
        <h2 class="section-title">热门推荐</h2>
        <div class="product-grid">
            <!-- 模拟4个产品 -->
            <div class="product-card">
                <div class="product-img">产品图片<img src="img/1.jpg"  width="150px"></div>
                <h3>高性能笔记本电脑</h3>
                <p style="color:red;">¥ 5999.00</p>
                <a href="detail.html" class="btn">查看详情</a>
            </div>
            <div class="product-card">
                <div class="product-img">产品图片<img src="img/2.jpg"  width="150px"></div>
                <h3>无线降噪耳机</h3>
                <p style="color:red;">¥ 1299.00</p>
                <a href="detail.html" class="btn">查看详情</a>
            </div>
            <div class="product-card">
                <div class="product-img">产品图片<img src="img/3.jpg"  width="150px"></div>
                <h3>智能运动手表</h3>
                <p style="color:red;">¥ 899.00</p>
                <a href="detail.html" class="btn">查看详情</a>
            </div>
            <div class="product-card">
                <div class="product-img">产品图片<img src="img/4.jpg"  width="150px"></div>
                <h3>4K 高清显示器</h3>
                <p style="color:red;">¥ 2499.00</p>
                <a href="detail.html" class="btn">查看详情</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2023 数码先锋商城 版权所有
    </footer>
</body>
</html>

        .stat-num { font-size: 24px; font-weight: bold; }

<body>

    <div class="hero">

        </div>
    </div>

    <div class="container intro">
        <h2>我们是谁？</h2>
        <p>数码先锋商城是一家专注于消费电子产品的在线零售平台。自创立以来，我们始终秉持“品质第一”的原则，严选全球优质数码产品，包括智能手机、笔记本电脑、智能穿戴设备等。</p>
        <p>我们的目标是成为您身边最值得信赖的数码管家。</p>
        <!-- 这里可以放一张公司环境图 -->
        <img src="img/7.jpg" alt="公司环境" class="team-img">

    <div class="stats">
        <div class="stat-item">
            <div class="stat-num">50,000+</div>

        </div>
        <div class="stat-item">

        </div>
        <div class="stat-item">
            <div class="stat-num">24h</div>
            <div>极速发货</div>
        </div>

    <!-- 4. 联系我们 -->
    <div class="container intro">
        <h2>联系我们</h2>
        <p>地址：某某市某某区科技产业园A栋</p>
        <p>电话：400-123-4567</p>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>产品列表 - 数码先锋</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-bar {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .filter-bar span {
            margin-right: 10px;
            font-weight: bold;
        }
        .filter-btn {
            padding: 5px 15px;
            border: 1px solid #ddd;
            background: white;
            margin-right: 10px;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .list-item {
            display: flex;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
            align-items:self-start;
            flex-direction: column;
        }
        .list-img {
            width: 100%;
            background: #eee;
            margin-bottom: 10px;
            max-width: 300px;
        }
        .list-info h3 { margin-bottom: 10px; }
        .list-info p { color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">数码先锋</div>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>

            </ul>

    </header>

            <div class="list-item">

                    <p>搭载 M2 Pro 或 M2 Max 芯片，带来惊人的性能和电池续航。</p>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户中心 - 数码先锋</title>
    <link rel="stylesheet" href="style.css">
<body>
    <div class="user-layout">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <ul>
                <li><a href=" " id="link-profile" class="active" onclick="showTab('profile')">个人信息</a ></li>
                <li><a href="#" id="link-orders" onclick="showTab('orders')">我的订单</a ></li>
            </ul>
        </div>

        <!-- 右侧内容区域 -->
        <div class="main-content">

            <!-- 1. 个人信息模块 (默认显示) -->
            <div id="tab-profile">
                <h2>个人信息</h2>
                <p>用户名：<span id="username">张三</span></p >
                <button onclick="editProfile()">编辑资料</button>
            </div>

            <!-- 2. 我的订单模块 (默认隐藏 style="display:none") -->
            <div id="tab-orders" style="display: none;">
                <h2>我的订单</h2>
                <table border="1" cellpadding="10" style="width: 100%; text-align: left; border-collapse: collapse;">
                    <tr style="background-color: #f5f5f5;">
                        <th>商品名称</th>
                        <th>价格</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    <tr>
                        <td>高性能笔记本电脑</td>
                        <td>¥5999.00</td>
                        <td>已发货</td>
                        <td><a href="#">查看详情</a ></td>
                    </tr>
                    <tr>
                        <td>无线降噪耳机</td>
                        <td>¥1299.00</td>
                        <td>待支付</td>
                        <td><a href="#">去支付</a ></td>
                    </tr>
                </table>
            </div>

        </div>
    </div>

    <script>
        function showTab(tabName) {
            // 1. 获取两个内容区域的元素
            var profileDiv = document.getElementById('tab-profile');
            var ordersDiv = document.getElementById('tab-orders');

            // 2. 获取两个导航链接的元素
            var linkProfile = document.getElementById('link-profile');
            var linkOrders = document.getElementById('link-orders');

            // 3. 判断点击的是哪一个
            if (tabName === 'profile') {
                // 显示个人信息，隐藏订单
                profileDiv.style.display = 'block';
                ordersDiv.style.display = 'none';

                // 切换高亮样式
                linkProfile.classList.add('active');
                linkOrders.classList.remove('active');
            } else {
                // 显示订单，隐藏个人信息
                profileDiv.style.display = 'none';
                ordersDiv.style.display = 'block';

                // 切换高亮样式
                linkProfile.classList.remove('active');
                linkOrders.classList.add('active');
            }
        }
    </script>
</body>
    <style>
    .user-layout {
        display: flex;
        min-height: 100vh; 
    }
    .sidebar {
        width: 200px;
        background: #f8f9fa; /* 去掉了方块 */
        padding: 20px;
        border-right: 1px solid #eee;
    }
    .sidebar ul li {
        margin-bottom: 15px;
        list-style: none; /* 去掉列表前面的小圆点 */
    }
    .sidebar ul li a {
        display: block;
        padding: 10px;
        background: white; /* 去掉了方块 */
        border-radius: 4px;
        text-decoration: none; /* 去掉下划线 */
        color: #333;
    }
    .sidebar ul li a:hover, .sidebar ul li a.active {
        background: #007bff; /* 去掉了方块 */
        color: white;
    }
    .main-content {
        flex: 1; /* 关键：让右边撑开 */
        padding: 20px;
    }
</style>
